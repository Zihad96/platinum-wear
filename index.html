<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platinum Wear</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border">
                <div class="logo"> </div>
            </div>
            <div class="nav-address border">
                <p class="add-first">Deliver to</p>
                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add-second">Chattogram</p>
                </div>
            </div>
            <div class="nav-search">
                <select class="search-select">
                    <option>ALL</option>
                </select>
                <input placeholder="search Amazon" class="search-input">
                <div class="search-icon">
                    <i class="fa-brands fa-sistrix"></i>
                </div>
            </div>
            <div class="nav-singin border">
                <p><span>Hello, sing in</span></p>
                <p class="nav-second">Acount & Lists</p>
            </div>
            <div class="nav-return border">
                <p><span>Returns</span></p>
                <p class="nav-second">& Orders</p>
            </div>
            <div class="nav-cart border">
                <i class="fa-solid fa-cart-shopping"></i>
                Cart
            </div>
        </div>

        <div class="panel">
            <div class="panel-all">
                <i class="fa-solid fa-bars"></i>
                ALL
            </div>
            <div class="panel-options">
                <p>Today's Deals</p>
                <p>Customer Service</p>
                <p> Registry</p>
                <p>Gift Cards</p>
                <p>Sell</p>
            </div>
            <div class="panel-deals">
                Shop deals in Electronics
            </div>
        </div>
    </header>


    <main>

        <div class="shop-section">

            <div class="box1 box">
                <div class="box-content">
                    <h2>CR7</h2>
                    <div class="box-img" style="background-image: url('img/cr7.png');"></div>
                    <p><a>See More</a></p>
                </div>
            </div>
            <div class="box2 box">
                <div class="box-content">
                    <h2>Ferrari</h2>
                    <div class="box-img" style="background-image: url('img/ferrari.png');"></div>
                    <p><a>See More</a></p>
                </div>
            </div>
            <div class="box3 box">
                <div class="box-content">
                    <h2>CR7</h2>
                    <div class="box-img" style="background-image: url('img/cr7.png');"></div>
                    <p><a>See More</a></p>
                </div>
            </div>
        </div>

    </main>



    <footer>

        <div class="footer">Made with love by platinum wear</div>
    </footer>


</body>

</html>
